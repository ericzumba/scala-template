services:
  dev:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    working_dir: /workspace
    volumes:
      - ..:/workspace
      - coursier-cache:/home/sbtuser/.cache/coursier
      - sbt-cache:/home/sbtuser/.sbt
    command: sleep infinity
    depends_on:
      - spark-master
      - spark-worker-1
    mem_limit: 4g
    cpus: 8

  spark-master:
    image: spark:3.5.7-scala2.12-java17-ubuntu
    container_name: spark-master
    hostname: spark-master
    command:
      - /bin/bash
      - -lc
      - |
        mkdir -p /tmp/spark-work && \
        /opt/spark/sbin/start-master.sh -h spark-master -p 7077 --webui-port 8080
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_DAEMON_MEMORY: 512m
      SPARK_MASTER_OPTS: "-Dspark.work.dir=/tmp/spark-work"
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ..:/workspace:ro
      - spark-master-tmp:/tmp/spark-work
    mem_limit: 1g

  spark-worker-1:
    image: spark:3.5.7-scala2.12-java17-ubuntu
    container_name: spark-worker-1
    hostname: spark-worker-1
    depends_on:
      - spark-master
    command:
      - /bin/bash
      - -lc
      - |
        mkdir -p /tmp/spark-work && \
        /opt/spark/sbin/start-worker.sh spark://spark-master:7077 --cores 2 --memory 1G --webui-port 8081
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_DAEMON_MEMORY: 512m
      SPARK_WORKER_OPTS: "-Dspark.worker.dir=/tmp/spark-work"
    ports:
      - "8081:8081"
    volumes:
      - ..:/workspace:ro
      - spark-worker-1-tmp:/tmp/spark-work
    mem_limit: 2g

volumes:
  coursier-cache:
  sbt-cache:
  spark-master-tmp:
  spark-worker-1-tmp: