services:
  dev:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    working_dir: /workspace
    volumes:
      - ..:/workspace
      - coursier-cache:/home/sbtuser/.cache/coursier
      - ivy-cache:/home/sbtuser/.ivy2
      - sbt-cache:/home/sbtuser/.sbt
      - m2-cache:/home/sbtuser/.m2
    command: sleep infinity
    depends_on:
      - spark-master
      - spark-worker-1

  spark-master:
    image: spark:3.5.7-scala2.12-java17-ubuntu
    container_name: spark-master
    hostname: spark-master
    command:
      - /opt/spark/sbin/start-master.sh
      - -h
      - spark-master
      - -p
      - "7077"
      - --webui-port
      - "8080"
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_DAEMON_MEMORY: 512m
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ..:/workspace:ro
      - spark-master-work:/opt/spark/work
    mem_limit: 768m
    cpus: 1.00

  spark-worker-1:
    image: spark:3.5.7-scala2.12-java17-ubuntu
    container_name: spark-worker-1
    hostname: spark-worker-1
    depends_on:
      - spark-master
    command:
      - /opt/spark/sbin/start-worker.sh
      - spark://spark-master:7077
      - --cores
      - "2"
      - --memory
      - "1G"
      - --webui-port
      - "8081"
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_DAEMON_MEMORY: 512m
    ports:
      - "8081:8081"
    volumes:
      - ..:/workspace:ro
      - spark-worker-1-work:/opt/spark/work
    mem_limit: 1536m
    cpus: 2.00

volumes:
  coursier-cache:
  ivy-cache:
  sbt-cache:
  m2-cache:
  spark-master-work:
  spark-worker-1-work: