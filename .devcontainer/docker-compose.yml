services:
  dev:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    working_dir: /workspace
    volumes:
      - ..:/workspace
      - coursier-cache:/home/sbtuser/.cache/coursier
      - ivy-cache:/home/sbtuser/.ivy2
      - sbt-cache:/home/sbtuser/.sbt
      - m2-cache:/home/sbtuser/.m2
    command: sleep infinity
volumes:
  coursier-cache:
  ivy-cache:
  sbt-cache:
  m2-cache: